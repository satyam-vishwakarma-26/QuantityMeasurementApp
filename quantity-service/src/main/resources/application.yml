server:
  port: 8082

spring:
  application:
    name: quantity-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    hostname: localhost
    prefer-ip-address: false

logging:
  level:
    com.app.quantity: DEBUG
    com.app.quantity.client.HistoryServiceClient: DEBUG

# Feign Client logging
feign:
  client:
    config:
      default:
        loggerLevel: full