server:
  port: 8081
  address: 127.0.0.1

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://localhost:3306/quantity_auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 9981
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}
            scope:
              - email
              - profile
redirect-uri: "http://localhost:8080/login/oauth2/code/google"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    hostname: localhost
    prefer-ip-address: false

jwt:
  secret: ${JWT_SECRET_KEY}
  expiration: 86400000

app:
  frontend:
    url: http://localhost:5173

logging:
  level:
    com.app: DEBUG
    org.springframework.security: DEBUG